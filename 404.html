<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 エラー / 404 Error - hamusata</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="icon.svg" type="image/svg+xml">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Potta+One&family=Roboto+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#F0F8FF;
      --panel:#FFFFFFcc;
      --text:#1A1A1A;
      --accent:#4EA0FF;
      --highlight:#A7C7FF;
      --radius:16px;
      --shadow:0 8px 24px rgba(0,0,0,0.15);
      --font-family:'Potta One', cursive;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1E1E2F;
        --panel:#2B2B3Ccc;
        --text:#E0E7FF;
        --accent:#4EA0FF;
        --highlight:#A7C7FF;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-family);
      line-height: 1.8;
    }

    .error-card {
      width: min(560px, 100%);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--accent);
      padding: 28px 24px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 9vw, 4rem);
      color: var(--highlight);
      letter-spacing: 0.08em;
    }

    p {
      margin: 0.5rem 0;
    }

    .subtext {
      color: var(--accent);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    a.back {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.65rem 1.2rem;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    a.back:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main class="error-card">
    <h1>404 エラー / 404 Error</h1>
    <p>ページが見つかりません / Page not found.</p>
    <p class="subtext">URLをご確認ください / Please check the URL.</p>
    <a id="backLink" class="back" href="/">トップページへ戻る</a>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (location.hostname === 'hamuzon.github.io') {
        document.getElementById('backLink').href = 'https://hamuzon.github.io/editor/';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Error / ページが見つかりません - hamusata</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="icon.svg" type="image/svg+xml">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Potta+One&family=Roboto+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F0F8FF;
      --panel: #FFFFFFcc;
      --text: #1A1A1A;
      --accent: #4EA0FF;
      --highlight: #A7C7FF;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      --font-family: 'Potta One', cursive;
    }

    body[data-theme="dark"] {
      --bg: #1E1E2F;
      --panel: #2B2B3Ccc;
      --text: #E0E7FF;
      --accent: #4EA0FF;
      --highlight: #A7C7FF;
    }

    body {
      margin: 0;
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .error-card {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      padding: 32px 24px;
      max-width: 480px;
      width: 100%;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    .error-card h1 {
      font-size: clamp(2.2rem, 8vw, 3.5rem);
      color: var(--highlight);
      margin: 0 0 1rem 0;
    }

    .error-card p {
      margin: 0.5rem 0;
      line-height: 1.5;
    }

    .error-card .subtext {
      color: var(--accent);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .error-card a {
      display: inline-block;
      padding: 0.65rem 1.2rem;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .error-card a:hover {
      opacity: 0.85;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (location.hostname === 'hamuzon.github.io') {
        document.getElementById('backLink').href = 'https://hamuzon.github.io/editor/';
      }
    });
  </script>
</head>

<body>
  <main class="error-card">
    <h1>404 Error / 404 エラー</h1>
    <p>Page not found / ページが見つかりません</p>
    <p class="subtext">Please check the URL / URLをご確認ください</p>
    <a href="/" id="backLink">Back to Home / トップページへ戻る</a>
  </main>
</body>

</html>
